<!DOCTYPE html>
<html>

<head>
<title>TaskPilot</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">

<h2>TaskPilot</h2>
<p>Navigate Your Work Efficiently</p>

<button onclick="addTask()">Add Task</button>
<button onclick="showCalendar()">Calendar</button>
<button onclick="showAnalytics()">Analytics</button>
<button onclick="exportExcel()">Export Excel</button>

</div>

<div class="board">

<div class="column">
<h3>Todo</h3>
<div id="todo"></div>
</div>

<div class="column">
<h3>Doing</h3>
<div id="doing"></div>
</div>

<div class="column">
<h3>Done</h3>
<div id="done"></div>
</div>

</div>

<script src="app.js"></script>
<script src="calendar.js"></script>
<script src="analytics.js"></script>
<script src="excel.js"></script>

</body>
</html>
